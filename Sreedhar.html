<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profile Card</title>
	<style>
		:root {
			--bg-1: #f6f7fb;
			--bg-2: #eef2ff;
			--card: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--accent: #0f766e;
			--accent-hover: #115e59;
			--ring: rgba(15, 118, 110, 0.25);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 10% 20%, var(--bg-2), transparent 45%),
				linear-gradient(135deg, var(--bg-1), #ffffff);
		}

		.card {
			width: min(100%, 420px);
			background: var(--card);
			border-radius: 18px;
			padding: 28px;
			box-shadow: 0 14px 35px rgba(0, 0, 0, 0.08);
			border: 1px solid #e5e7eb;
			animation: fade-in 500ms ease-out;
		}

		.avatar {
			width: 72px;
			height: 72px;
			border-radius: 50%;
			display: grid;
			place-items: center;
			font-size: 26px;
			font-weight: 700;
			color: #ffffff;
			background: linear-gradient(135deg, #0f766e, #0ea5a0);
			margin-bottom: 14px;
		}

		h1 {
			font-size: 1.4rem;
			margin-bottom: 8px;
			letter-spacing: 0.2px;
		}

		p {
			color: var(--muted);
			line-height: 1.6;
			margin-bottom: 20px;
		}

		.skills {
			list-style: none;
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 20px;
		}

		.skills li {
			font-size: 0.86rem;
			padding: 6px 10px;
			border-radius: 999px;
			background: #ecfeff;
			color: #0f766e;
			border: 1px solid #ccfbf1;
		}

		.actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.btn {
			appearance: none;
			border: none;
			border-radius: 10px;
			padding: 10px 14px;
			font-size: 0.95rem;
			cursor: pointer;
			transition: transform 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
		}

		.btn-primary {
			background: var(--accent);
			color: #ffffff;
		}

		.btn-primary:hover {
			background: var(--accent-hover);
			transform: translateY(-1px);
			box-shadow: 0 8px 18px var(--ring);
		}

		.btn-secondary {
			background: #f3f4f6;
			color: #374151;
		}

		.btn-secondary:hover {
			background: #e5e7eb;
		}

		@keyframes fade-in {
			from {
				opacity: 0;
				transform: translateY(8px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>
<body>
	<main class="card">
		<div class="avatar">S</div>
		<h1>Sreedhar</h1>
		<p>
			Frontend learner building clean, responsive web pages using HTML and CSS.
			This example uses semantic HTML and modern CSS styling.
		</p>

		<ul class="skills">
			<li>HTML5</li>
			<li>CSS3</li>
			<li>Responsive UI</li>
		</ul>

		<div class="actions">
			<button class="btn btn-primary" type="button">Contact</button>
			<button class="btn btn-secondary" type="button">Portfolio</button>
		</div>
	</main>
</body>
</html>
